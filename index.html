<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股決策戰情室 (TradingView 專業版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-4 md:p-6">

    <div class="max-w-7xl mx-auto space-y-4">
        
        <!-- 上方：標題與搜尋區 -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700">
            <h1 class="text-2xl font-bold text-blue-400 flex items-center gap-2">
                📈 台股決策戰情室 <span class="text-xs bg-green-900 text-green-200 px-2 py-1 rounded">TradingView 專業圖表</span>
            </h1>
            <div class="text-sm font-mono text-gray-400" id="tw-clock"></div>
        </div>

        <!-- 主要內容區 -->
        <div class="grid grid-cols-1 lg:grid-cols-10 gap-6">
            
            <!-- 中間：TradingView 專業 K 線圖 (佔 7 份) -->
            <div class="lg:col-span-7 bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 h-[550px]">
                <div id="tradingview_chart" class="w-full h-full"></div>
            </div>

            <!-- 右邊：四大面向彈出卡片 -->
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 h-full flex flex-col gap-3">
                    <h2 class="text-lg font-bold border-b border-gray-600 pb-2">📋 個股分析 (點擊查看)</h2>
                    <div onclick="alertDetail('基本面', '本益比(PE): 18.5\n營收成長: +12%\n毛利率: 52%')" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg border-l-4 border-blue-500 cursor-pointer transition-all">基本面 (財報導向)</div>
                    <div onclick="alertDetail('技術面', '月線趨勢: 多頭\nRSI: 62 (強勢)\nMACD: 黃金交叉')" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg border-l-4 border-yellow-500 cursor-pointer transition-all">技術面 (指標運算)</div>
                    <div onclick="alertDetail('籌碼面', '外資: 連買3日\n投信: 轉賣為買\n主力: 籌碼集中')" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg border-l-4 border-red-500 cursor-pointer transition-all">籌碼面 (主力動向)</div>
                    <div onclick="alertDetail('消息面', '最新: 法說會釋出利多\n目標價: 調升至 $950')" class="bg-gray-700 hover:bg-gray-600 p-4 rounded-lg border-l-4 border-green-500 flex-1 cursor-pointer transition-all">消息面 (新聞快訊)</div>
                </div>
            </div>
        </div>

        <!-- AI 策略面板 -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2">🤖 AI 綜合量化策略建議</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                <div class="bg-gray-900 p-4 rounded-lg border border-gray-700">
                    <p class="text-gray-400 text-sm">訊號方向</p>
                    <p class="text-3xl font-bold text-red-500 mt-2">做多 🔴</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-lg border border-gray-700">
                    <p class="text-gray-400 text-sm">最佳進場點</p>
                    <p class="text-xl font-bold text-blue-300 mt-2">拉回均線 820</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-lg border border-gray-700">
                    <p class="text-gray-400 text-sm">風險控管(停損)</p>
                    <p class="text-xl font-bold text-gray-300 mt-2">破月線 780</p>
                </div>
            </div>
        </div>
    </div>

    <!-- TradingView 腳本 -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 載入 TradingView 圖表
        new TradingView.widget({
            "container_id": "tradingview_chart",
            "width": "100%",
            "height": "100%",
            "symbol": "TWSE:2330",
            "interval": "D",
            "timezone": "Asia/Taipei",
            "theme": "dark",
            "style": "1",
            "locale": "zh_TW",
            "toolbar_bg": "#1f2937",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "studies": [ "MACD@tv-basicstudies", "RSI@tv-basicstudies" ]
        });

        // 簡單的時間顯示
        setInterval(() => {
            document.getElementById('tw-clock').innerText = new Date().toLocaleString('zh-TW', {timeZone: 'Asia/Taipei'});
        }, 1000);

        // 彈出框功能
        function alertDetail(title, content) {
            alert(title + ":\n\n" + content);
        }
    </script>
</body>
</html>
